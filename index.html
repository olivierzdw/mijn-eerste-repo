<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olliebet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>⚽ Olliebet</h1>
    <p>Kies twee clubs en vul jouw voorspelling in</p>
  </header>

  <main>
    <div class="wedstrijd-maker">

      <div class="match-row">

        <!-- Thuisclub -->
        <div class="club-blok">
          <img id="thuis-logo" src="" alt="" class="club-logo-groot" />
          <select id="thuis-club" onchange="updateLogo('thuis')">
            <option value="">-- Thuisclub --</option>
          </select>
        </div>

        <!-- Scores -->
        <div class="score-midden">
          <input type="number" id="thuis-score" min="0" max="20" placeholder="0" />
          <span>–</span>
          <input type="number" id="uit-score" min="0" max="20" placeholder="0" />
        </div>

        <!-- Uitclub -->
        <div class="club-blok">
          <img id="uit-logo" src="" alt="" class="club-logo-groot" />
          <select id="uit-club" onchange="updateLogo('uit')">
            <option value="">-- Uitclub --</option>
          </select>
        </div>

      </div>

      <button onclick="voegToe()">Voeg voorspelling toe</button>
      <p class="fout" id="fout-melding"></p>
    </div>

    <div class="lijst" id="lijst"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
