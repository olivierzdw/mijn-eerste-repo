<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olliebet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>⚽ Olliebet</h1>

    <div class="header-nav">
      <button class="nav-btn" id="btn-uitslagen" onclick="toonPagina('uitslagen')">Uitslagen</button>
      <button class="nav-btn" id="btn-stand" onclick="toonPagina('stand')">Stand</button>
    </div>

    <div class="club-zoek" id="club-zoek">
      <input type="text" id="club-zoek-input" placeholder="Zoek een club wereldwijd..." autocomplete="off" />
      <div class="club-zoek-resultaten hidden" id="club-zoek-resultaten"></div>
    </div>

    <div class="gebruikers-balk">
      <div class="gebruikers-lijst" id="gebruikers-lijst"></div>
      <button class="gebruiker-toevoegen" onclick="toonNieuweGebruiker()">+ Speler</button>
    </div>

    <div class="nieuwe-gebruiker hidden" id="nieuwe-gebruiker-form">
      <input type="text" id="nieuwe-naam" placeholder="Naam (bijv. Papa)" maxlength="20" />
      <button onclick="voegGebruikerToe()">Toevoegen</button>
      <button class="annuleer" onclick="verbergNieuweGebruiker()">Annuleer</button>
    </div>
  </header>

  <div class="uitslagen-panel hidden" id="stand-panel">
    <div class="uitslagen-header">
      <h2>Eredivisie stand</h2>
    </div>
    <div id="stand-lijst"></div>
  </div>

  <div class="uitslagen-panel hidden" id="uitslagen-panel">
    <div class="uitslagen-header">
      <h2>Uitslagen Ajax</h2>
    </div>
    <div id="uitslagen-lijst"></div>
  </div>

  <main id="main-inhoud" class="hidden">

    <div id="club-sectie" class="hidden">
      <h2 class="sectie-titel" id="club-sectie-titel"></h2>
      <div class="ajax-wedstrijden" id="club-wedstrijden"></div>
    </div>

    <h2 class="sectie-titel">Komende Ajax wedstrijden</h2>
    <div class="ajax-wedstrijden" id="ajax-wedstrijden"></div>

    <h2 class="sectie-titel">Komende AFC JO11-4 wedstrijden</h2>
    <div class="ajax-wedstrijden" id="afc-wedstrijden"></div>

  </main>

  <div class="geen-gebruiker" id="geen-gebruiker">
    <p>Kies of voeg een speler toe om te beginnen</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
