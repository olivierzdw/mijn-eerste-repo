<!DOCTYPE html>
<html lang="nl">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olliebet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>⚽ Olliebet</h1>
    <p>Vul jouw verwachte score in voor elke wedstrijd</p>

  <main>
    <div class="wedstrijden" id="wedstrijden"></div>

    </div>
    <div id="bevestiging" class="bevestiging hidden">✅ Voorspellingen opgeslagen!</div>
  </main>

  <script src="script.js"></script>
</body>
