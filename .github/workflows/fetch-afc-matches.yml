name: Fetch AFC teams

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover & scrape every AFC team
        run: |
          python3 - <<'EOF'
          import re, json, urllib.request, urllib.error, os, time
          from datetime import datetime, timedelta

          # Overzichts­pagina's waaruit we /team/<slug>/ URLs ontdekken.
          # Als AFC nieuwe teams toevoegt (bv. nieuw seizoen) verschijnen ze
          # vanzelf — we hoeven niets te hardcoderen.
          overview_urls = [
              'https://www.afc.nl/senioren-zaterdag/',
              'https://www.afc.nl/senioren-zondag/',
              'https://www.afc.nl/jeugd-zaterdag/',
              'https://www.afc.nl/jeugd-zondag/',
              'https://www.afc.nl/vrouwen/',
              'https://www.afc.nl/meisjes-zaterdag/',
              'https://www.afc.nl/meisjes-zaterdag-copy/',
              'https://www.afc.nl/veteranen-zaterdag/',
          ]

          maand_namen = ['januari','februari','maart','april','mei','juni',
                         'juli','augustus','september','oktober','november','december']
          maand_kort = {
              'jan':1,'feb':2,'mrt':3,'maa':3,'apr':4,'mei':5,'jun':6,
              'jul':7,'aug':8,'sep':9,'okt':10,'nov':11,'dec':12
          }
          dag_namen   = ['zo','ma','di','wo','do','vr','za']
          logo_map = {
              'AFC': 'images/afc.png',
              'Blauw-Wit': 'images/blauw-wit.png',
              'Fortius': 'images/fortius.png',
              'Sloterdijk': 'images/sloterdijk.png',
          }
          def logo(naam):
              for k, v in logo_map.items():
                  if k.lower() in naam.lower():
                      return v
              return ''

          def fetch(url):
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return r.read().decode('utf-8', errors='ignore')

          def slug_naar_naam(slug):
              # Fallback: maak een leesbare naam van de slug, bv. "afc-jo11-4" → "AFC JO11-4".
              s = slug.upper().replace('-', ' ')
              # Plak achterhangsels weer aan: "JO11 4" → "JO11-4", "O23 1" → "O23-1", "VR 1" → "VR1"
              s = re.sub(r'\b(JO|MO|VR|O)\s*(\d+)\s*-?\s*(\d+)?', lambda m:
                         f"{m.group(1)}{m.group(2)}" + (f"-{m.group(3)}" if m.group(3) else ''), s)
              # Verwijder trailing "-N" duplicaat (slug "afc-3-2" → "AFC 3" kan dubbel zijn)
              return s

          # ───── Stap 1: ontdek alle team-slugs ─────
          discovered = {}  # slug → {soort}
          slug_re = re.compile(r'/team/([a-z0-9][a-z0-9\-]*?)/', re.IGNORECASE)
          for url in overview_urls:
              try:
                  html = fetch(url)
              except Exception as e:
                  print(f"overzicht {url} fout: {e}")
                  continue
              # Bepaal soort uit URL voor in de zoekomschrijving
              if 'senioren-zaterdag' in url:    soort = 'Senioren zaterdag'
              elif 'senioren-zondag' in url:    soort = 'Senioren zondag'
              elif 'jeugd-zaterdag' in url:     soort = 'Jeugd zaterdag'
              elif 'jeugd-zondag' in url:       soort = 'Jeugd zondag'
              elif 'vrouwen' in url:            soort = 'Vrouwen'
              elif 'meisjes' in url:            soort = 'Meisjes'
              elif 'veteranen' in url:          soort = 'Veteranen'
              else:                             soort = 'AFC'
              gevonden = set(m.group(1).lower() for m in slug_re.finditer(html))
              for slug in gevonden:
                  if slug not in discovered:
                      discovered[slug] = {'soort': soort}
              print(f"{url}: {len(gevonden)} slugs")
              time.sleep(1)
          print(f"Totaal unieke teams ontdekt: {len(discovered)}")

          # ───── Stap 2: per team matches + stand scrapen ─────
          def parse_matches(html):
              rows = re.findall(
                  r'<div class="block-play-program__row">(.*?)</div>\s*</div>\s*</div>',
                  html, re.DOTALL
              )
              matches = []
              now = datetime.now()
              for row in rows:
                  teams = re.findall(
                      r'<div>\s*(?:<img[^>]*>)?\s*([^<]+?)\s*</div>',
                      row
                  )
                  if len(teams) < 2:
                      continue
                  thuis = re.sub(r'\s+', ' ', teams[0]).strip()
                  uit   = re.sub(r'\s+', ' ', teams[1]).strip()

                  dm = re.search(
                      r'class="date">\s*(\d{1,2})\s+([a-zà-ÿ]+)\s*</span>',
                      row, re.IGNORECASE
                  )
                  tm = re.search(
                      r'class="block-play-program__time">\s*(\d{1,2}):(\d{2})',
                      row
                  )
                  if not dm or not tm:
                      continue
                  dag = int(dm.group(1))
                  maand = maand_kort.get(dm.group(2).lower()[:3])
                  if not maand:
                      continue
                  uur, minuut = int(tm.group(1)), int(tm.group(2))

                  d = datetime(now.year, maand, dag, uur, minuut)
                  if d < now - timedelta(hours=3):
                      d = datetime(now.year + 1, maand, dag, uur, minuut)
                  if d < now - timedelta(hours=3):
                      continue

                  dag_naam = dag_namen[(d.weekday()+1) % 7]
                  datum = f"{dag_naam} {dag} {maand_namen[maand-1]} {uur:02d}:{minuut:02d}"
                  matches.append({
                      'datum': datum,
                      'thuis': thuis,
                      'thuisLogo': logo(thuis),
                      'uit': uit,
                      'uitLogo': logo(uit),
                  })
              return matches

          rij_re = re.compile(
              r'<tr[^>]*>\s*<th[^>]*>\s*(\d+)\s*</th>\s*'
              r'<td[^>]*>(.*?)</td>\s*<td[^>]*>(\d+)</td>\s*<td[^>]*>(\d+)</td>\s*'
              r'<td[^>]*>(\d+)</td>\s*<td[^>]*>(\d+)</td>\s*<td[^>]*>(\d+)</td>\s*'
              r'<td[^>]*>(\d+)</td>\s*<td[^>]*>(\d+)</td>',
              re.DOTALL
          )

          def parse_stand_van_tbody(tbody):
              stand = []
              for m in rij_re.finditer(tbody):
                  pos, club_raw, g, w, gl, v, p, vv, gt = m.groups()
                  club = re.sub(r'\s+', ' ', re.sub(r'<[^>]+>', '', club_raw)).strip()
                  vi, ti = int(vv), int(gt)
                  stand.append({
                      'positie':  int(pos),
                      'club':     club,
                      'logo':     logo(club),
                      'gespeeld': int(g),
                      'gewonnen': int(w),
                      'gelijk':   int(gl),
                      'verloren': int(v),
                      'voor':     vi,
                      'tegen':    ti,
                      'doelsaldo': vi - ti,
                      'punten':   int(p),
                  })
              stand.sort(key=lambda r: r['positie'])
              return stand

          def parse_stand(html, team_naam):
              poules = []
              for m in re.finditer(
                  r'<tbody([^>]*)data-poule-standings="(\d+)"([^>]*)>(.*?)</tbody>',
                  html, re.DOTALL
              ):
                  attrs_voor, pid, attrs_na, body = m.groups()
                  attrs = attrs_voor + attrs_na
                  is_active = 'class="active"' in attrs or "class='active'" in attrs \
                              or ' active' in attrs or '"active"' in attrs
                  stand = parse_stand_van_tbody(body)
                  if not stand:
                      continue
                  team_kort = team_naam.lower()
                  bevat_team = any(
                      team_kort in (r['club'] or '').lower()
                      or (r['club'] or '').lower() in team_kort
                      for r in stand
                  )
                  poules.append({
                      'id': pid,
                      'active': is_active,
                      'bevat_team': bevat_team,
                      'stand': stand,
                  })
              if not poules:
                  return None, []
              def hoogste(lst):
                  return max(lst, key=lambda p: int(p['id']))
              kandidaten = [p for p in poules if p['active'] and p['bevat_team']]
              if kandidaten:
                  k = hoogste(kandidaten); return k['id'], k['stand']
              kandidaten = [p for p in poules if p['bevat_team']]
              if kandidaten:
                  k = hoogste(kandidaten); return k['id'], k['stand']
              kandidaten = [p for p in poules if p['active']]
              if kandidaten:
                  k = hoogste(kandidaten); return k['id'], k['stand']
              k = hoogste(poules)
              return k['id'], k['stand']

          def parse_team_naam(html, fallback):
              # Probeer een <h1> uit de hero te halen
              m = re.search(r'<h1[^>]*>\s*([^<]+?)\s*</h1>', html)
              if m:
                  naam = re.sub(r'\s+', ' ', m.group(1)).strip()
                  if naam:
                      return naam
              return fallback

          os.makedirs('data/afc-teams', exist_ok=True)
          team_index = []  # voor data/afc-teams.json
          poule_changes = []

          for slug, meta in sorted(discovered.items()):
              url = f"https://www.afc.nl/team/{slug}/"
              try:
                  html = fetch(url)
              except Exception as e:
                  print(f"  {slug}: fout bij ophalen: {e}")
                  continue

              naam = parse_team_naam(html, slug_naar_naam(slug))

              # Matches
              try:
                  m = parse_matches(html)
                  with open(f"data/afc-teams/{slug}-matches.json", 'w') as f:
                      json.dump(m, f, ensure_ascii=False, indent=2)
                  aantal_m = len(m)
              except Exception as e:
                  print(f"  {slug}: matches fout: {e}")
                  aantal_m = 0

              # Stand
              poule_id = None
              aantal_s = 0
              try:
                  pid, stand = parse_stand(html, naam)
                  if stand:
                      meta_pad = f"data/afc-teams/{slug}-poule.txt"
                      vorige = None
                      if os.path.exists(meta_pad):
                          with open(meta_pad) as f:
                              vorige = f.read().strip()
                      if vorige and vorige != pid:
                          poule_changes.append(f"{naam}: {vorige} -> {pid}")
                          print(f"  >>> NIEUWE POULE: {naam}: {vorige} -> {pid}")
                      with open(meta_pad, 'w') as f:
                          f.write(pid or '')
                      with open(f"data/afc-teams/{slug}-stand.json", 'w') as f:
                          json.dump(stand, f, ensure_ascii=False, indent=2)
                      poule_id = pid
                      aantal_s = len(stand)
              except Exception as e:
                  print(f"  {slug}: stand fout: {e}")

              team_index.append({
                  'slug':     slug,
                  'naam':     naam,
                  'soort':    meta['soort'],
                  'pouleId':  poule_id,
                  'heeftStand':    aantal_s > 0,
                  'aantalMatches': aantal_m,
              })
              print(f"  {slug} ({naam}): {aantal_m} wedstrijden, {aantal_s} in stand")
              time.sleep(0.5)

          # Sorteer index logisch: senioren zaterdag eerst, dan zondag, dan
          # jeugd zaterdag, jeugd zondag, vrouwen, meisjes, veteranen.
          soort_orde = {
              'Senioren zaterdag': 0,
              'Senioren zondag':   1,
              'Jeugd zaterdag':    2,
              'Jeugd zondag':      3,
              'Vrouwen':           4,
              'Meisjes':           5,
              'Veteranen':         6,
          }
          team_index.sort(key=lambda t: (soort_orde.get(t['soort'], 9), t['naam']))

          with open('data/afc-teams.json', 'w') as f:
              json.dump(team_index, f, ensure_ascii=False, indent=2)

          if poule_changes:
              with open('data/.poule-changed', 'w') as f:
                  f.write('\n'.join(poule_changes) + '\n')

          print(f"Klaar: {len(team_index)} AFC teams geïndexeerd")
          EOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/afc-teams.json data/afc-teams/
          if [ -f data/.poule-changed ]; then
            MSG="Nieuwe AFC poule gedetecteerd"$'\n\n'"$(cat data/.poule-changed)"
            rm data/.poule-changed
          else
            MSG="Update AFC team wedstrijden en stand"
          fi
          git diff --staged --quiet || git commit -m "$MSG"
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
