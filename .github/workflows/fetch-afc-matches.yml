name: Fetch AFC teams

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch AFC teams (matches + stand)
        run: |
          python3 - <<'EOF'
          import re, json, urllib.request, os
          from datetime import datetime, timedelta

          # Welke AFC teams scrapen we?
          # slug = padstuk op afc.nl/team/<slug>/
          # bestandsbasis = naam voor data/<basis>-matches.json en data/<basis>-stand.json
          teams = [
              {'slug': 'afc-1',      'basis': 'afc-1',     'naam': 'AFC 1'},
              {'slug': 'afc-jo11-4', 'basis': 'afc',       'naam': 'AFC JO11-4'},
          ]

          maand_namen = ['januari','februari','maart','april','mei','juni',
                         'juli','augustus','september','oktober','november','december']
          maand_kort = {
              'jan':1,'feb':2,'mrt':3,'maa':3,'apr':4,'mei':5,'jun':6,
              'jul':7,'aug':8,'sep':9,'okt':10,'nov':11,'dec':12
          }
          dag_namen   = ['zo','ma','di','wo','do','vr','za']
          logo_map = {
              'AFC': 'images/afc.png',
              'Blauw-Wit': 'images/blauw-wit.png',
              'Fortius': 'images/fortius.png',
              'Sloterdijk': 'images/sloterdijk.png',
          }
          def logo(naam):
              for k, v in logo_map.items():
                  if k.lower() in naam.lower():
                      return v
              return ''

          def fetch(url):
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return r.read().decode('utf-8', errors='ignore')

          def parse_matches(html):
              # Nieuwe AFC.nl structuur: block-play-program rows met los
              # datum/tijd/team-divs, zonder jaar in de datum.
              rows = re.findall(
                  r'<div class="block-play-program__row">(.*?)</div>\s*</div>\s*</div>',
                  html, re.DOTALL
              )
              matches = []
              now = datetime.now()
              for row in rows:
                  teams = re.findall(
                      r'<div>\s*(?:<img[^>]*>)?\s*([^<]+?)\s*</div>',
                      row
                  )
                  if len(teams) < 2:
                      continue
                  thuis = re.sub(r'\s+', ' ', teams[0]).strip()
                  uit   = re.sub(r'\s+', ' ', teams[1]).strip()

                  dm = re.search(
                      r'class="date">\s*(\d{1,2})\s+([a-zà-ÿ]+)\s*</span>',
                      row, re.IGNORECASE
                  )
                  tm = re.search(
                      r'class="block-play-program__time">\s*(\d{1,2}):(\d{2})',
                      row
                  )
                  if not dm or not tm:
                      continue
                  dag = int(dm.group(1))
                  maand = maand_kort.get(dm.group(2).lower()[:3])
                  if not maand:
                      continue
                  uur, minuut = int(tm.group(1)), int(tm.group(2))

                  # Geen jaar in HTML: kies eerst dit jaar; als ver in verleden
                  # ligt, zal het volgend jaar zijn (najaar -> voorjaar overgang).
                  d = datetime(now.year, maand, dag, uur, minuut)
                  if d < now - timedelta(hours=3):
                      d = datetime(now.year + 1, maand, dag, uur, minuut)
                  if d < now - timedelta(hours=3):
                      continue

                  dag_naam = dag_namen[(d.weekday()+1) % 7]
                  datum = f"{dag_naam} {dag} {maand_namen[maand-1]} {uur:02d}:{minuut:02d}"
                  matches.append({
                      'datum': datum,
                      'thuis': thuis,
                      'thuisLogo': logo(thuis),
                      'uit': uit,
                      'uitLogo': logo(uit),
                  })
              return matches

          rij_re = re.compile(
              r'<tr[^>]*>\s*<th[^>]*>\s*(\d+)\s*</th>\s*'
              r'<td[^>]*>(.*?)</td>\s*<td[^>]*>(\d+)</td>\s*<td[^>]*>(\d+)</td>\s*'
              r'<td[^>]*>(\d+)</td>\s*<td[^>]*>(\d+)</td>\s*<td[^>]*>(\d+)</td>\s*'
              r'<td[^>]*>(\d+)</td>\s*<td[^>]*>(\d+)</td>',
              re.DOTALL
          )

          def parse_stand_van_tbody(tbody):
              stand = []
              for m in rij_re.finditer(tbody):
                  pos, club_raw, g, w, gl, v, p, vv, gt = m.groups()
                  club = re.sub(r'\s+', ' ', re.sub(r'<[^>]+>', '', club_raw)).strip()
                  vi, ti = int(vv), int(gt)
                  stand.append({
                      'positie':  int(pos),
                      'club':     club,
                      'logo':     logo(club),
                      'gespeeld': int(g),
                      'gewonnen': int(w),
                      'gelijk':   int(gl),
                      'verloren': int(v),
                      'voor':     vi,
                      'tegen':    ti,
                      'doelsaldo': vi - ti,
                      'punten':   int(p),
                  })
              stand.sort(key=lambda r: r['positie'])
              return stand

          def parse_stand(html, team_naam):
              # Verzamel ALLE poules + of ze "active" gemarkeerd zijn
              poules = []
              for m in re.finditer(
                  r'<tbody([^>]*)data-poule-standings="(\d+)"([^>]*)>(.*?)</tbody>',
                  html, re.DOTALL
              ):
                  attrs_voor, pid, attrs_na, body = m.groups()
                  attrs = attrs_voor + attrs_na
                  is_active = 'class="active"' in attrs or "class='active'" in attrs \
                              or ' active' in attrs or '"active"' in attrs
                  stand = parse_stand_van_tbody(body)
                  if not stand:
                      continue
                  # Bevat deze poule ons team?
                  team_kort = team_naam.lower()
                  # Pak deel achter "AFC " bv "JO11-4" of "1" zodat we matchen op
                  # zowel "AFC 1" als "AFC JO11-4"
                  bevat_team = any(
                      team_kort in (r['club'] or '').lower()
                      or (r['club'] or '').lower() in team_kort
                      for r in stand
                  )
                  poules.append({
                      'id': pid,
                      'active': is_active,
                      'bevat_team': bevat_team,
                      'stand': stand,
                  })

              if not poules:
                  return None, []

              # Voorkeursvolgorde:
              # 1) active EN bevat team
              # 2) bevat team
              # 3) active
              # 4) laatste poule op de pagina
              for p in poules:
                  if p['active'] and p['bevat_team']:
                      return p['id'], p['stand']
              for p in poules:
                  if p['bevat_team']:
                      return p['id'], p['stand']
              for p in poules:
                  if p['active']:
                      return p['id'], p['stand']
              p = poules[-1]
              return p['id'], p['stand']

          os.makedirs('data', exist_ok=True)
          for t in teams:
              url = f"https://www.afc.nl/team/{t['slug']}/"
              print(f"=== {t['naam']} ({url}) ===")
              try:
                  html = fetch(url)
              except Exception as e:
                  print(f"  fout bij ophalen: {e}")
                  continue

              # Matches - altijd overschrijven (ook met lege lijst) zodat
              # gespeelde wedstrijden direct verdwijnen.
              try:
                  m = parse_matches(html)
                  with open(f"data/{t['basis']}-matches.json", 'w') as f:
                      json.dump(m, f, ensure_ascii=False, indent=2)
                  print(f"  {len(m)} wedstrijden")
              except Exception as e:
                  print(f"  matches fout: {e}")

              # Stand
              try:
                  poule_id, stand = parse_stand(html, t['naam'])
                  if stand:
                      # Detecteer wisseling van poule en log dat duidelijk
                      meta_pad = f"data/{t['basis']}-poule.txt"
                      vorige = None
                      if os.path.exists(meta_pad):
                          with open(meta_pad) as f:
                              vorige = f.read().strip()
                      if vorige and vorige != poule_id:
                          print(f"  >>> NIEUWE POULE gedetecteerd: {vorige} -> {poule_id}")
                      with open(meta_pad, 'w') as f:
                          f.write(poule_id or '')
                      with open(f"data/{t['basis']}-stand.json", 'w') as f:
                          json.dump(stand, f, ensure_ascii=False, indent=2)
                      print(f"  poule {poule_id}: {len(stand)} teams in stand")
                  else:
                      print(f"  geen stand gevonden (bestaande data behouden)")
              except Exception as e:
                  print(f"  stand fout: {e}")
          EOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*-matches.json data/*-stand.json data/*-poule.txt
          git diff --staged --quiet || git commit -m "Update AFC team wedstrijden en stand"
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
