name: Fetch AFC teams

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch AFC teams (matches + stand)
        run: |
          python3 - <<'EOF'
          import re, json, urllib.request, os
          from datetime import datetime, timedelta

          # Welke AFC teams scrapen we?
          # slug = padstuk op afc.nl/team/<slug>/
          # bestandsbasis = naam voor data/<basis>-matches.json en data/<basis>-stand.json
          teams = [
              {'slug': 'afc-1',      'basis': 'afc-1',     'naam': 'AFC 1'},
              {'slug': 'afc-jo11-4', 'basis': 'afc',       'naam': 'AFC JO11-4'},
          ]

          maand_namen = ['januari','februari','maart','april','mei','juni',
                         'juli','augustus','september','oktober','november','december']
          dag_namen   = ['zo','ma','di','wo','do','vr','za']
          logo_map = {
              'AFC': 'images/afc.png',
              'Blauw-Wit': 'images/blauw-wit.png',
              'Fortius': 'images/fortius.png',
              'Sloterdijk': 'images/sloterdijk.png',
          }
          def logo(naam):
              for k, v in logo_map.items():
                  if k.lower() in naam.lower():
                      return v
              return ''

          def fetch(url):
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return r.read().decode('utf-8', errors='ignore')

          def parse_matches(html):
              blokken = re.findall(
                  r'(\d{2}-\d{2}-\d{4}).*?(\d{2}:\d{2}).*?class="[^"]*team[^"]*home[^"]*"[^>]*>(.*?)</.*?class="[^"]*team[^"]*away[^"]*"[^>]*>(.*?)</',
                  html, re.DOTALL
              )
              matches = []
              now = datetime.now()
              for datum_str, tijd, thuis_raw, uit_raw in blokken:
                  thuis = re.sub(r'<[^>]+>', '', thuis_raw).strip()
                  uit   = re.sub(r'<[^>]+>', '', uit_raw).strip()
                  dag, maand, jaar = datum_str.split('-')
                  uur, minuut = tijd.split(':')
                  d = datetime(int(jaar), int(maand), int(dag), int(uur), int(minuut))
                  if d < now - timedelta(hours=3):
                      continue
                  dag_naam = dag_namen[(d.weekday()+1) % 7]
                  datum = f"{dag_naam} {int(dag)} {maand_namen[int(maand)-1]} {tijd}"
                  matches.append({
                      'datum': datum,
                      'thuis': thuis,
                      'thuisLogo': logo(thuis),
                      'uit': uit,
                      'uitLogo': logo(uit),
                  })
              return matches

          def parse_stand(html):
              actief = re.search(
                  r'<tbody[^>]*data-poule-standings="(\d+)"[^>]*class="active"[^>]*>(.*?)</tbody>',
                  html, re.DOTALL
              )
              if not actief:
                  alle = re.findall(
                      r'<tbody[^>]*data-poule-standings="(\d+)"[^>]*>(.*?)</tbody>',
                      html, re.DOTALL
                  )
                  if not alle:
                      return None, []
                  poule_id, tbody = alle[-1]
              else:
                  poule_id, tbody = actief.group(1), actief.group(2)

              rij_re = re.compile(
                  r'<tr[^>]*>\s*<th[^>]*>\s*(\d+)\s*</th>\s*'
                  r'<td[^>]*>(.*?)</td>\s*<td[^>]*>(\d+)</td>\s*<td[^>]*>(\d+)</td>\s*'
                  r'<td[^>]*>(\d+)</td>\s*<td[^>]*>(\d+)</td>\s*<td[^>]*>(\d+)</td>\s*'
                  r'<td[^>]*>(\d+)</td>\s*<td[^>]*>(\d+)</td>',
                  re.DOTALL
              )
              stand = []
              for m in rij_re.finditer(tbody):
                  pos, club_raw, g, w, gl, v, p, vv, gt = m.groups()
                  club = re.sub(r'\s+', ' ', re.sub(r'<[^>]+>', '', club_raw)).strip()
                  vi, ti = int(vv), int(gt)
                  stand.append({
                      'positie':  int(pos),
                      'club':     club,
                      'logo':     logo(club),
                      'gespeeld': int(g),
                      'gewonnen': int(w),
                      'gelijk':   int(gl),
                      'verloren': int(v),
                      'voor':     vi,
                      'tegen':    ti,
                      'doelsaldo': vi - ti,
                      'punten':   int(p),
                  })
              stand.sort(key=lambda r: r['positie'])
              return poule_id, stand

          os.makedirs('data', exist_ok=True)
          for t in teams:
              url = f"https://www.afc.nl/team/{t['slug']}/"
              print(f"=== {t['naam']} ({url}) ===")
              try:
                  html = fetch(url)
              except Exception as e:
                  print(f"  fout bij ophalen: {e}")
                  continue

              # Matches
              try:
                  m = parse_matches(html)
                  if m:
                      with open(f"data/{t['basis']}-matches.json", 'w') as f:
                          json.dump(m, f, ensure_ascii=False, indent=2)
                      print(f"  {len(m)} wedstrijden")
                  else:
                      print(f"  geen wedstrijden gevonden (bestaande data behouden)")
              except Exception as e:
                  print(f"  matches fout: {e}")

              # Stand
              try:
                  poule_id, stand = parse_stand(html)
                  if stand:
                      with open(f"data/{t['basis']}-stand.json", 'w') as f:
                          json.dump(stand, f, ensure_ascii=False, indent=2)
                      print(f"  poule {poule_id}: {len(stand)} teams in stand")
                  else:
                      print(f"  geen stand gevonden (bestaande data behouden)")
              except Exception as e:
                  print(f"  stand fout: {e}")
          EOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*-matches.json data/*-stand.json
          git diff --staged --quiet || git commit -m "Update AFC team wedstrijden en stand"
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
