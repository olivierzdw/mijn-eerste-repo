name: Fetch clubs

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-clubs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all clubs from major competitions
        run: |
          python3 - <<'EOF'
          import json, urllib.request, time

          API_KEY = '${{ secrets.FOOTBALL_API_KEY }}'
          competitions = ['PL', 'PD', 'BL1', 'SA', 'FL1', 'DED', 'PPL', 'CL', 'EL', 'BSA', 'ELC']
          clubs = {}

          for comp in competitions:
              url = f'https://api.football-data.org/v4/competitions/{comp}/teams'
              req = urllib.request.Request(url, headers={'X-Auth-Token': API_KEY})
              try:
                  with urllib.request.urlopen(req) as r:
                      data = json.loads(r.read())
                  for t in data.get('teams', []):
                      clubs[t['id']] = {
                          'id':   t['id'],
                          'naam': t['name'],
                          'logo': t.get('crest', ''),
                          'land': t.get('area', {}).get('name', ''),
                      }
                  print(f"{comp}: {len(data.get('teams', []))} clubs")
              except Exception as e:
                  print(f"{comp}: fout - {e}")
              time.sleep(7)

          result = sorted(clubs.values(), key=lambda c: c['naam'])
          with open('data/clubs.json', 'w') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print(f"Totaal: {len(result)} clubs opgeslagen")
          EOF

      - name: Commit updated clubs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/clubs.json
          git diff --staged --quiet || git commit -m "Update clubs lijst"
          git push
