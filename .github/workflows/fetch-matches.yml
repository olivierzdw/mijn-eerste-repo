name: Fetch Ajax matches

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch matches from API
        run: |
          curl -s "https://api.football-data.org/v4/teams/678/matches?status=SCHEDULED,TIMED" \
            -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_KEY }}" \
            -o raw.json

          python3 - <<'EOF'
          import json
          from datetime import datetime
          import zoneinfo

          with open('raw.json') as f:
              data = json.load(f)

          dag_namen   = ['zo','ma','di','wo','do','vr','za']
          maand_namen = ['januari','februari','maart','april','mei','juni',
                         'juli','augustus','september','oktober','november','december']
          club_mapping = {
              'AFC Ajax':'Ajax','Ajax':'Ajax',
              'PSV Eindhoven':'PSV','PSV':'PSV',
              'Feyenoord':'Feyenoord',
              'AZ Alkmaar':'AZ','AZ':'AZ',
              'FC Utrecht':'FC Utrecht',
              'FC Twente':'Twente','Twente':'Twente',
              'NEC Nijmegen':'NEC','NEC':'NEC',
              'SC Heerenveen':'Heerenveen','Heerenveen':'Heerenveen',
              'FC Groningen':'Groningen','Groningen':'Groningen',
              'Sparta Rotterdam':'Sparta','Sparta':'Sparta',
              'RKC Waalwijk':'RKC','RKC':'RKC',
              'Go Ahead Eagles':'Go Ahead Eagles',
              'NAC Breda':'NAC Breda',
              'Willem II':'Willem II',
          }

          tz = zoneinfo.ZoneInfo('Europe/Amsterdam')
          matches = []
          for m in data.get('matches', []):
              d = datetime.fromisoformat(m['utcDate'].replace('Z','+00:00')).astimezone(tz)
              dag   = dag_namen[(d.weekday() + 1) % 7]
              maand = maand_namen[d.month - 1]
              datum = f"{dag} {d.day} {maand} {d.hour:02d}:{d.minute:02d}"
              matches.append({
                  'id':        m['id'],
                  'datum':     datum,
                  'thuis':     club_mapping.get(m['homeTeam']['name'], m['homeTeam']['name']),
                  'thuisLogo': m['homeTeam'].get('crest', ''),
                  'uit':       club_mapping.get(m['awayTeam']['name'], m['awayTeam']['name']),
                  'uitLogo':   m['awayTeam'].get('crest', ''),
              })

          with open('data/ajax-matches.json','w') as f:
              json.dump(matches, f, ensure_ascii=False, indent=2)
          print(f"Saved {len(matches)} matches")
          EOF

      - name: Fetch finished matches
        run: |
          curl -s "https://api.football-data.org/v4/teams/678/matches?status=FINISHED" \
            -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_KEY }}" \
            -o finished.json

          python3 - <<'EOF'
          import json
          from datetime import datetime
          import zoneinfo

          with open('finished.json') as f:
              data = json.load(f)

          dag_namen   = ['zo','ma','di','wo','do','vr','za']
          maand_namen = ['januari','februari','maart','april','mei','juni',
                         'juli','augustus','september','oktober','november','december']
          club_mapping = {
              'AFC Ajax':'Ajax','PSV Eindhoven':'PSV','PSV':'PSV','SC Heerenveen':'Heerenveen',
              'FC Utrecht':'FC Utrecht','NAC Breda':'NAC Breda','FC Twente':'Twente','Twente':'Twente',
              'NEC Nijmegen':'NEC','FC Groningen':'Groningen','Sparta Rotterdam':'Sparta',
              'RKC Waalwijk':'RKC','Go Ahead Eagles':'Go Ahead Eagles','Willem II':'Willem II',
              'AZ Alkmaar':'AZ','Feyenoord':'Feyenoord','Heracles Almelo':'Heracles',
          }
          tz = zoneinfo.ZoneInfo('Europe/Amsterdam')
          results = []
          for m in data.get('matches', []):
              d = datetime.fromisoformat(m['utcDate'].replace('Z','+00:00')).astimezone(tz)
              dag = dag_namen[(d.weekday()+1)%7]
              datum = f"{dag} {d.day} {maand_namen[d.month-1]}"
              results.append({
                  'id': m['id'],
                  'datum': datum,
                  'thuis': club_mapping.get(m['homeTeam']['name'], m['homeTeam']['name']),
                  'thuisLogo': m['homeTeam'].get('crest',''),
                  'uit': club_mapping.get(m['awayTeam']['name'], m['awayTeam']['name']),
                  'uitLogo': m['awayTeam'].get('crest',''),
                  'thuisScore': m['score']['fullTime']['home'],
                  'uitScore': m['score']['fullTime']['away'],
              })
          with open('data/ajax-results.json','w') as f:
              json.dump(results, f, ensure_ascii=False, indent=2)
          print(f"Saved {len(results)} results")
          EOF

      - name: Fetch Eredivisie stand
        run: |
          curl -s "https://api.football-data.org/v4/competitions/DED/standings" \
            -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_KEY }}" \
            -o ded_stand.json

          python3 - <<'EOF'
          import json

          with open('ded_stand.json') as f:
              data = json.load(f)

          club_mapping = {
              'AFC Ajax':'Ajax','PSV Eindhoven':'PSV','PSV':'PSV','Feyenoord':'Feyenoord',
              'AZ Alkmaar':'AZ','FC Utrecht':'FC Utrecht','FC Twente':'Twente',
              'NEC Nijmegen':'NEC','SC Heerenveen':'Heerenveen','FC Groningen':'Groningen',
              'Sparta Rotterdam':'Sparta','RKC Waalwijk':'RKC',
              'Go Ahead Eagles':'Go Ahead Eagles','NAC Breda':'NAC Breda',
              'Willem II':'Willem II','Heracles Almelo':'Heracles',
          }
          logo_override = {
              'NAC Breda': 'https://crests.football-data.org/681.png',
          }

          table = data['standings'][0]['table']
          stand = []
          for row in table:
              t = row['team']
              naam = club_mapping.get(t['name'], t['name'])
              ds = row['goalsFor'] - row['goalsAgainst']
              stand.append({
                  'positie':   row['position'],
                  'club':      naam,
                  'logo':      logo_override.get(naam, t.get('crest', '')),
                  'gespeeld':  row['playedGames'],
                  'punten':    row['points'],
                  'gewonnen':  row['won'],
                  'gelijk':    row['draw'],
                  'verloren':  row['lost'],
                  'doelsaldo': ds,
                  'voor':      row['goalsFor'],
                  'tegen':     row['goalsAgainst'],
              })

          with open('data/eredivisie-stand.json', 'w') as f:
              json.dump(stand, f, ensure_ascii=False, indent=2)
          print(f"Saved {len(stand)} teams")
          EOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ajax-matches.json data/ajax-results.json data/eredivisie-stand.json
          git diff --staged --quiet || git commit -m "Update Ajax wedstrijden en stand"
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
